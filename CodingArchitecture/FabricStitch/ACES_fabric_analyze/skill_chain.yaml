# ═══════════════════════════════════════════════════════════════════════════════
# skill_chain.yaml — ACES Skill Chain Definition (canonical WORM form)
# FQSN: CodingArchitecture/FabricStitch/ACES_fabric_analyze
# VERSION: 3.0.0
#
# 7 parallel agents — each with model optimized for cognitive task.
# Agent 7 (ACES_temporal_gap_analysis) has its own source override:
#   it fetches the CURRENT repo state while agents 1-6 fetch the article.
# spawn_delay_ms staggers launch to prevent Ollama queue saturation.
# ═══════════════════════════════════════════════════════════════════════════════

title:   "UOR Framework — Parallel Skill Chain Analysis"
source:  "https://next.redhat.com/2022/07/13/the-uor-framework/"
vendor:  "Ollama"
model:   "qwen3.5:397b-cloud"
outdir:  "~/fabric-analysis/uor-framework"
obsidian: ""
skip_docx: false

# ── PARALLEL AGENTS (7 total) ─────────────────────────────────────────────────
# Agents 1-6: fetch the original article (chain.source)
# Agent 7:    fetches the CURRENT repo state (source override)

agents:

  - pattern: extract_article_wisdom
    label:   "Article Wisdom — summary, ideas, quotes, facts, refs"
    vendor:  "Ollama"
    model:   "qwen3.5:397b-cloud"
    source:  ""                        # uses chain.source
    spawn_delay_ms: 0
    retry:   1
    timeout: 600
    enabled: true

  - pattern: extract_wisdom
    label:   "Deep Wisdom — insights, habits, recommendations"
    vendor:  "Ollama"
    model:   "qwen3-next:80b-cloud"
    source:  ""
    spawn_delay_ms: 3000
    retry:   1
    timeout: 600
    enabled: true

  - pattern: extract_ideas
    label:   "Idea Inventory — all concepts surfaced"
    vendor:  "Ollama"
    model:   "ministral-3:14b-cloud"
    source:  ""
    spawn_delay_ms: 1000
    retry:   1
    timeout: 600
    enabled: true

  - pattern: extract_questions
    label:   "Discussion Questions — raw question set"
    vendor:  "Ollama"
    model:   "gemma4:31b-cloud"
    source:  ""
    spawn_delay_ms: 1000
    retry:   1
    timeout: 300
    enabled: true

  - pattern: analyze_claims
    label:   "Claims Analysis — evidence, gaps, counters"
    vendor:  "Ollama"
    model:   "devstral-small-2:24b-cloud"
    source:  ""
    spawn_delay_ms: 2000
    retry:   1
    timeout: 600
    enabled: true

  - pattern: summarize
    label:   "Executive Summary — distilled key points"
    vendor:  "Ollama"
    model:   "qwen3.5:cloud"
    source:  ""
    spawn_delay_ms: 500
    retry:   1
    timeout: 300
    enabled: true

  - pattern: ACES_temporal_gap_analysis
    label:   "Temporal Gap — current state vs original claims"
    vendor:  "Ollama"
    model:   "glm-4.7:cloud"
    source:  "https://github.com/QCadjunct/UOR-Framework"
    spawn_delay_ms: 1500
    retry:   1
    timeout: 300
    enabled: true

# ── $AND BARRIER ──────────────────────────────────────────────────────────────
barrier:
  name:       "and_barrier"
  on_failure: "retry"
  required:   []

# ── SYNTHESIS NODE ────────────────────────────────────────────────────────────
synthesis:
  pattern:        "synthesize_analysis_brief_from_wisdom"
  vendor:         "Ollama"
  model:          "gpt-oss:120b-cloud"
  word_minimum:   5000
  word_target:    6500
  word_limit:     8000
  document_limit: 15000
  directive:      ""
