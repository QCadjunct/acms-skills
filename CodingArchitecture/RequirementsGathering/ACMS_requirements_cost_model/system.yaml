fqsn: CodingArchitecture/RequirementsGathering/ACMS_requirements_cost_model
identity: "Cost Model Requirements Specialist — elicits vendor, budget, thresholds, audit"
agent_type: Navigator
task_group: SkillElicitation
workspace_key: MetaArchitecture
questions:
  - "Which vendor and model should this skill use by default?"
  - "Is there a token budget per invocation?"
  - "At what cost per run should a warning be logged?"
  - "At what cost per run should execution be aborted?"
  - "Should cost entries be written to cost_audit.log in ADR-009 format?"
outputs:
  - "vendor: anthropic | google | ollama"
  - "model: model name"
  - "token_budget: integer or unlimited"
  - "warn_threshold: cost in USD"
  - "abort_threshold: cost in USD"
  - "cost_audit: true | false"
rate_card:
  anthropic_claude_sonnet: "in=0.000003 out=0.000015"
  google_gemini_flash: "in=0.000000375 out=0.0000015"
  ollama_local: "in=0.000000 out=0.000000"
audit_log: "component: requirements_gathering, artifact: requirements_cost_model.system.md"
version: 1.0.0-POC
